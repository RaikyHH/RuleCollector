services:
  rulecollector:
    image: ghcr.io/raikyhh/rulecollector:latest
    container_name: rulecollector
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # All persistent data lives here:
      #   sigma_rules.db        — rule database
      #   config.json           — source configuration (seeded from config.example.json on first run)
      #   features.json         — feature flags and scheduler settings (seeded from image default on first run)
      #   sync_state/           — incremental sync state per source
      #   sigma_rules_files/    — cached raw YAML files
      - ./data:/data
    env_file:
      # Copy .env.example to .env and fill in your values.
      # Required: GITHUB_TOKEN (avoids GitHub rate limits)
      # Optional: HTTP_PROXY / HTTPS_PROXY / NO_PROXY
      - path: .env
        required: false
    environment:
      # Inline overrides — prefer .env for secrets.
      # GITHUB_TOKEN: your_token_here
      # HTTP_PROXY: "http://proxy.example.com:3128"
      # HTTPS_PROXY: "http://proxy.example.com:3128"
      # NO_PROXY: "localhost,127.0.0.1"
